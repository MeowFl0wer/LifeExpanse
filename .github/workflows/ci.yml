name: CI

# Runs on every push to main and on every pull request. A red run means the
# change is not ready to merge; it is not advisory.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    name: 前端 · 类型检查 / 测试 / 构建
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.9

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      # Fails if the lockfile disagrees with package.json, so CI installs the
      # same versions a fresh clone would.
      - run: pnpm install --frozen-lockfile

      - name: 类型检查
        run: pnpm exec tsc --noEmit

      - name: 单元测试
        run: pnpm test

      - name: 构建
        run: pnpm build

  backend:
    name: 后端 · 测试
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - run: pip install -r requirements-dev.txt

      - name: 单元测试
        run: pytest -q
